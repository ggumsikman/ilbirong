<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일비롱디자인 자동 견적 계산기</title>
    <meta name="description" content="유아교육기관 전문 디자인 업체 '일비롱디자인'의 자동 견적 계산기입니다. 원하시는 상품을 선택해 예상 견적을 확인해보세요!">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: 둥근고딕 느낌의 'Jua' 혹은 부드러운 'Noto Sans KR' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>일비롱디자인</h1>
            <p>자동 견적 계산기 <span id="adminTrigger" style="cursor: default; user-select: none;">🎨</span></p>
        </header>

        <main>
            <section class="selector-section">
                <!-- 카테고리 선택 -->
                <div class="input-group">
                    <label for="categorySelect">분류</label>
                    <div class="custom-select">
                        <select id="categorySelect">
                            <option value="">카테고리를 선택해주세요</option>
                        </select>
                    </div>
                </div>

                <!-- 상품 선택 -->
                <div class="input-group">
                    <label for="productSelect">상품 및 크기</label>
                    <div class="custom-select">
                        <select id="productSelect" disabled>
                            <option value="">먼저 카테고리를 선택해주세요</option>
                        </select>
                    </div>
                </div>

                <!-- 비규격 직접 입력 (기본 숨김) -->
                <div id="customSizeGroup" class="input-group custom-size-group" style="display: none;">
                    <label>사이즈 직접 입력 (가로 x 세로)</label>
                    <div class="size-inputs">
                        <div class="size-input-wrapper">
                            <input type="number" id="customWidth" placeholder="가로" min="1">
                            <span class="unit">cm</span>
                        </div>
                        <span class="cross-icon">×</span>
                        <div class="size-input-wrapper">
                            <input type="number" id="customHeight" placeholder="세로" min="1">
                            <span class="unit">cm</span>
                        </div>
                    </div>
                    <div class="custom-price-preview">
                        예상 단가: <strong id="customDynamicPrice">0원</strong>
                    </div>
                </div>

                <div class="quantity-add-group">
                    <div class="quantity-control" style="opacity: 0.5; pointer-events: none;" id="quantityWrapper">
                        <button type="button" id="btnMinus" aria-label="수량 감소">-</button>
                        <input type="number" id="quantityInput" value="1" min="1" readonly>
                        <button type="button" id="btnPlus" aria-label="수량 증가">+</button>
                    </div>
                    <button type="button" id="btnAddCart" class="btn-primary" disabled>장바구니 담기</button>
                </div>
            </section>

            <section class="cart-section">
                <div class="cart-header">
                    <h2>나의 장바구니 🛒</h2>
                </div>
                <!-- 예쁜 식판 느낌의 장바구니 리스트 -->
                <ul id="cartList" class="cart-list empty">
                    <li class="empty-msg">원하시는 상품을 담아주세요.</li>
                </ul>
            </section>

            <section class="summary-section">
                <div class="summary-row">
                    <span>상품 금액</span>
                    <span id="itemsTotal">0원</span>
                </div>
                <div class="summary-row">
                    <span>배송비 <small id="shippingTooltip">(기본 배송비)</small></span>
                    <span id="shippingFee">0원</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>총 결제 예상 금액</span>
                    <span id="grandTotal" class="highlight">0원</span>
                </div>
            </section>

            <div class="action-section">
                <button type="button" id="btnCopyEstimate" class="btn-action">
                    📋 견적 내용 복사하기
                </button>
                <p class="help-text">복사 후 대표님께 바로 카톡으로 보내주세요!</p>
            </div>
        </main>
        
        <!-- 토스트 메시지 -->
        <div id="toast" class="toast">복사 완료!</div>

        <!-- Admin Indicator (Floating) -->
        <div id="adminIndicator" class="admin-indicator" style="display: none;">
            <span>👑 관리자 모드 작동 중</span>
            <div style="display:flex; gap: 8px;">
                <button id="btnOpenAdminPanel" class="btn-pill">편집창 열기</button>
                <button id="btnExitAdmin" class="btn-pill-danger">종료</button>
            </div>
        </div>

        <!-- Admin Panel Modal -->
        <div id="adminModal" class="admin-modal" style="display: none;">
            <div class="admin-modal-overlay"></div>
            <div class="admin-modal-content">
                <div class="admin-header">
                    <h2>👑 상품 관리자 패널</h2>
                    <button id="btnCloseAdmin" class="btn-close-modal">&times;</button>
                </div>
                <div class="admin-body">
                    <p class="admin-desc">카테고리와 상품 정보, 비규격 마진율을 실시간으로 수정해보세요.</p>
                    <div id="adminCategoryList" class="admin-category-list">
                        <!-- 동적 렌더링 영역 -->
                    </div>
                </div>
                <div class="admin-footer">
                    <button type="button" id="btnAdminReset" class="btn-danger">기본 데이터 복구</button>
                    <button type="button" id="btnAdminExport" class="btn-primary" style="background-color: #A8E6CF; color: #333;">웹 배포용 내보내기 📥</button>
                    <button type="button" id="btnAdminSave" class="btn-primary">변경 사항 저장 💾</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="admin.js"></script>
</body>
</html>
